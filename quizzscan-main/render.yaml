services:
  - type: web
    name: quizzscan
    env: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      apt-get install -y poppler-utils || true
      cd ../frontend && npm install && npm run build
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: STORAGE_DIR
        value: /var/data/storage
      - key: ALLOWED_ORIGINS
        value: https://quizzscan.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: quizzscan-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: quizzscan-storage
      mountPath: /var/data
      sizeGB: 5

databases:
  - name: quizzscan-db
    databaseName: quizzscan
    plan: free
